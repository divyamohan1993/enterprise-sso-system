[package]
name = "audit-witness"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
common = { path = "../../common" }
crypto = { path = "../../crypto" }
ml-dsa.workspace = true
sha2.workspace = true
hex.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
zeroize.workspace = true
libc.workspace = true
nix = { version = "0.29", default-features = false, features = ["socket"] }

[lib]
name = "audit_witness"
path = "src/lib.rs"

[[bin]]
name = "audit-witness"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[features]
default = ["production"]
production = ["common/production"]
