---
# ==============================================================================
# MILNET SSO — Kubernetes Deployments
# ==============================================================================
# All 8 services + PostgreSQL as Deployments with:
#   - Resource limits matching docker-compose
#   - Liveness and readiness probes
#   - Restricted security contexts
#   - Anti-affinity for TSS nodes (spread across physical hosts)
# ==============================================================================

# --- Gateway Deployment ---
# Test: kubectl exec into gateway pod and attempt to write to /
#   Expected: read-only filesystem error (readOnlyRootFilesystem: true)
# Test: kubectl exec and run `id` inside gateway pod
#   Expected: uid=1000 (runAsNonRoot enforced)
# Test: kubectl exec and run `cat /proc/1/status | grep CapEff`
#   Expected: 0000000000000000 (all capabilities dropped)
# Test: verify gateway pods are spread across nodes
#   Expected: topologySpreadConstraints maxSkew=1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: milnet-sso
  labels:
    app: gateway
    tier: bastion
    version: v1
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: gateway
  annotations:
    milnet.io/test-readonly-fs: "exec-touch-tmp-file-expect-ok-touch-root-file-expect-fail"
    milnet.io/test-nonroot: "exec-id-expect-uid-1000"
    milnet.io/test-caps: "exec-cat-proc-status-expect-zero-caps"
    milnet.io/test-spread: "get-pods-wide-verify-different-nodes"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: bastion
        version: v1
        app.kubernetes.io/part-of: milnet-sso
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: gcr.io/milnet-sso/gateway:latest
          ports:
            - containerPort: 9100
              protocol: TCP
              name: shard
          env:
            - name: GATEWAY_PORT
              value: "9100"
            - name: GATEWAY_BIND_ADDR
              value: "0.0.0.0"
            - name: ORCHESTRATOR_ADDR
              value: "orchestrator:9101"
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: milnet-config
                  key: rust-log
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gateway

