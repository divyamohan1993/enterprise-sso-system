---
# ==============================================================================
# MILNET SSO — Pod Security Policy (Restricted Profile)
# ==============================================================================
# NOTE: PodSecurityPolicy is deprecated since K8s 1.21 and removed in 1.25.
# The namespace-level Pod Security Standards labels in namespace.yaml provide
# the primary enforcement. This PSP is retained for clusters running < 1.25
# or using a policy engine (OPA/Kyverno) that consumes PSP-style definitions.
# ==============================================================================
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: milnet-sso-restricted
  labels:
    app.kubernetes.io/part-of: milnet-sso
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfiles: runtime/default
    apparmor.security.beta.kubernetes.io/allowedProfiles: runtime/default
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  readOnlyRootFilesystem: true
  runAsUser:
    rule: MustRunAsNonRoot
  runAsGroup:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65534
  fsGroup:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65534
  supplementalGroups:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65534
  volumes:
    - configMap
    - emptyDir
    - projected
    - secret
    - downwardAPI
    - persistentVolumeClaim
  hostNetwork: false
  hostIPC: false
  hostPID: false
  seLinux:
    rule: RunAsAny

