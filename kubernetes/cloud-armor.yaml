---
# ==============================================================================
# MILNET SSO — GCP Cloud Armor WAF Policy (Kubernetes-native)
# ==============================================================================
# This manifest defines the Cloud Armor security policy referenced by
# the BackendConfig in ingress.yaml. Apply with kubectl after enabling
# the Cloud Armor CRDs, or use the equivalent gcloud commands / Terraform.
#
# For clusters without Cloud Armor CRDs, use infrastructure/waf-rules.json
# with: gcloud compute security-policies import milnet-sso-waf \
#         --file-format=json --source=infrastructure/waf-rules.json
# ==============================================================================

# The Cloud Armor policy is managed via the BackendConfig + gcloud/Terraform.
# Below is the equivalent Kubernetes annotation reference and GKE config.

apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: milnet-waf-backend
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: bastion
spec:
  # Reference to Cloud Armor security policy (created via gcloud or Terraform)
  securityPolicy:
    name: milnet-sso-waf
  # Custom request headers for backend identification
  customRequestHeaders:
    headers:
      - "X-Cloud-Armor-Policy: milnet-sso-waf"
  # Connection draining for graceful shutdown
  connectionDraining:
    drainingTimeoutSec: 60
  # CDN disabled (SSO is not cacheable)
  cdn:
    enabled: false
  # Session affinity for consistent routing during auth flows
  sessionAffinity:
    affinityType: GENERATED_COOKIE
    affinityCookieTtlSec: 300
  # Health check configuration
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /healthz
    port: 8080
  # Logging
  logging:
    enable: true
    sampleRate: 1.0
