# MILNET SSO System — TSS (Threshold Signing Service) StatefulSets
# Two components:
#   1. tss-coordinator: 3 replicas with Raft leader election, routes signing requests
#   2. tss-signer: 5 replicas, each holds a unique FROST 3-of-5 share
#
# SECURITY: Init container logic is inlined into the main container entrypoint
# to eliminate busybox from the image supply chain (signer only).
---
# ── TSS Coordinator StatefulSet ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tss-coordinator
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-coordinator
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: tss-coordinator
spec:
  serviceName: tss-coordinator
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: tss-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tss-coordinator
        app.kubernetes.io/part-of: milnet-sso
    spec:
      serviceAccountName: tss-coordinator-sa
      automountServiceAccountToken: false  # No K8s API access needed
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - tss-coordinator
              topologyKey: kubernetes.io/hostname
      containers:
        - name: tss-coordinator
          image: gcr.io/MILNET_PROJECT/milnet-tss-coordinator:v1.0.0  # pinned version — never use :latest
          ports:
            - containerPort: 9103
              name: service
              protocol: TCP
            - containerPort: 9090
              name: raft
              protocol: TCP
            - containerPort: 10103
              name: health
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_TSS_ROLE
              value: "coordinator"
            - name: TSS_ADDR
              value: "0.0.0.0:9103"
            - name: MILNET_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MILNET_SERVICE_TYPE
              value: "tss-coordinator"
            - name: MILNET_RAFT_ADDR
              value: "0.0.0.0:9090"
            # Raft peers for coordinator leader election
            - name: MILNET_CLUSTER_PEERS
              value: >-
                tss-coordinator-0.tss-coordinator.milnet.svc.cluster.local:9090,
                tss-coordinator-1.tss-coordinator.milnet.svc.cluster.local:9090,
                tss-coordinator-2.tss-coordinator.milnet.svc.cluster.local:9090
            # Signer addresses for the coordinator to reach all 5 signers
            - name: MILNET_TSS_SIGNER_ADDRS
              value: >-
                tss-signer-0.tss-signer.milnet.svc.cluster.local:9110,
                tss-signer-1.tss-signer.milnet.svc.cluster.local:9111,
                tss-signer-2.tss-signer.milnet.svc.cluster.local:9112,
                tss-signer-3.tss-signer.milnet.svc.cluster.local:9113,
                tss-signer-4.tss-signer.milnet.svc.cluster.local:9114
            - name: MILNET_TSS_PUBLIC_KEY_PACKAGE
              valueFrom:
                secretKeyRef:
                  name: milnet-tss-public
                  key: MILNET_TSS_PUBLIC_KEY_PACKAGE
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: state
              mountPath: /var/lib/milnet
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: state
        labels:
          app.kubernetes.io/name: tss-coordinator
          app.kubernetes.io/part-of: milnet-sso
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd-encrypted
        resources:
          requests:
            storage: 5Gi

---
# ── TSS Signer StatefulSet ────────────────────────────────────────────────────
# 5 replicas. Each signer holds a unique FROST share (3-of-5 threshold).
# Shares are injected from per-index Secrets (milnet-tss-share-0 through milnet-tss-share-4).
#
# SECURITY: Init container logic (signer env computation, share selection)
# is inlined into the main container entrypoint to eliminate busybox.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tss-signer
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-signer
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: tss-signer
spec:
  serviceName: tss-signer
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: tss-signer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tss-signer
        app.kubernetes.io/part-of: milnet-sso
    spec:
      serviceAccountName: tss-signer-sa
      automountServiceAccountToken: false  # No K8s API access needed
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # Prefer spreading signers across nodes for maximum fault tolerance.
          # Using preferred (not required) because we have 5 signers and may
          # have fewer than 5 nodes; required would leave pods unschedulable.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - tss-signer
                topologyKey: kubernetes.io/hostname
      # SECURITY: No init containers — all per-pod logic (signer port
      # computation, share selection) is inlined into the main container
      # entrypoint. This eliminates busybox from the supply chain.
      containers:
        - name: tss-signer
          image: gcr.io/MILNET_PROJECT/milnet-tss-signer:v1.0.0  # pinned version — never use :latest
          # Ports are dynamic (9110+ordinal), but we declare the range for documentation.
          ports:
            - containerPort: 9110
              name: service
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_TSS_ROLE
              value: "signer"
            - name: MILNET_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          # Inline init logic: compute signer port from ordinal and select
          # the correct per-pod sealed share — replaces busybox init containers
          command:
            - sh
            - -c
            - |
              # Compute signer address and health port from pod ordinal
              ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
              SIGNER_PORT=$((9110 + ORDINAL))
              export MILNET_TSS_SIGNER_ADDR="0.0.0.0:${SIGNER_PORT}"
              export MILNET_HEALTH_PORT=$((SIGNER_PORT + 1000))
              # Select the correct per-pod sealed share based on ordinal
              SHARE_FILE="/etc/milnet/shares/share-${ORDINAL}/MILNET_TSS_SHARE_SEALED"
              if [ -f "$SHARE_FILE" ]; then
                export MILNET_TSS_SHARE_SEALED=$(cat "$SHARE_FILE")
              fi
              exec /service
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
          livenessProbe:
            tcpSocket:
              port: 9110
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9110
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: tss-share-0
              mountPath: /etc/milnet/shares/share-0
              readOnly: true
            - name: tss-share-1
              mountPath: /etc/milnet/shares/share-1
              readOnly: true
            - name: tss-share-2
              mountPath: /etc/milnet/shares/share-2
              readOnly: true
            - name: tss-share-3
              mountPath: /etc/milnet/shares/share-3
              readOnly: true
            - name: tss-share-4
              mountPath: /etc/milnet/shares/share-4
              readOnly: true
            - name: state
              mountPath: /var/lib/milnet
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        # Individual share secrets for each signer (0 through 4)
        - name: tss-share-0
          secret:
            secretName: milnet-tss-share-0
            optional: true
        - name: tss-share-1
          secret:
            secretName: milnet-tss-share-1
            optional: true
        - name: tss-share-2
          secret:
            secretName: milnet-tss-share-2
            optional: true
        - name: tss-share-3
          secret:
            secretName: milnet-tss-share-3
            optional: true
        - name: tss-share-4
          secret:
            secretName: milnet-tss-share-4
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: state
        labels:
          app.kubernetes.io/name: tss-signer
          app.kubernetes.io/part-of: milnet-sso
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd-encrypted
        resources:
          requests:
            storage: 2Gi
