name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Stage 1: Build & Test ────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy lint (security-hardened)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::indexing_slicing
      - name: Run tests
        run: cargo test --workspace
      - name: Build release binaries
        run: cargo build --workspace --release --features production
      - name: Upload release binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-binaries
          path: target/release/
          retention-days: ${{ github.ref == 'refs/heads/master' && 90 || 1 }}

  # ── Stage 1b: Benchmark Smoke Test ───────────────────────────────────────────
  benchmark:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
      - name: Run benchmarks (smoke test)
        run: |
          cargo bench --workspace -- --output-format bencher 2>&1 | tee bench-output.txt
        env:
          RUST_MIN_STACK: "8388608"
          # SECURITY: Test-only KEK. startup_checks.rs rejects this pattern in production.
          MILNET_MASTER_KEK: "abababababababababababababababababababababababababababababababababab"
      - name: Verify benchmark output
        run: |
          python3 -c "
          found = 0
          for line in open('bench-output.txt'):
              if 'ns/iter' in line:
                  found += 1
                  print(line.strip())
          print(f'Benchmarks found: {found}')
          if found == 0:
              print('WARNING: no benchmark results parsed')
          "
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-benchmark-results
          path: bench-output.txt
          retention-days: 30

  # ── Stage 2: Security Audit ──────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable

      # cargo-deny: license, advisory, source, and ban checks
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny (all checks)
        run: cargo deny check advisories licenses sources bans

      # cargo-audit: complementary vulnerability database check (hard fail)
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit (hard fail on known vulnerabilities)
        run: cargo audit --deny warnings

  # ── Stage 3: SBOM Generation ─────────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable

      # CycloneDX format SBOM (hard requirement — no soft failure)
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (CycloneDX JSON)
        run: cargo cyclonedx --format json --output sbom-cyclonedx.json
      - name: Validate CycloneDX SBOM is non-empty
        run: |
          if [ ! -s sbom-cyclonedx.json ]; then
            echo "ERROR: CycloneDX SBOM is empty or missing"
            exit 1
          fi
          echo "CycloneDX SBOM generated: $(wc -c < sbom-cyclonedx.json) bytes"

      # SPDX format SBOM
      - name: Install cargo-spdx
        run: cargo install cargo-spdx --locked
      - name: Generate SBOM (SPDX JSON)
        run: cargo spdx --output-format json > sbom-spdx.json
      - name: Validate SPDX SBOM is non-empty
        run: |
          if [ ! -s sbom-spdx.json ]; then
            echo "ERROR: SPDX SBOM is empty or missing"
            exit 1
          fi
          echo "SPDX SBOM generated: $(wc -c < sbom-spdx.json) bytes"

      # Validate SBOMs against known vulnerability databases
      - name: Install grype for SBOM vulnerability scanning
        run: |
          GRYPE_VERSION="0.87.0"
          GRYPE_SHA256="3622b817440ec21d54b8a4e89ad11703937cb0e0e09c2e2a40f6a861939b3072"
          curl -sSfL -o grype.tar.gz "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          echo "${GRYPE_SHA256}  grype.tar.gz" | sha256sum -c -
          tar -xzf grype.tar.gz -C /usr/local/bin grype
          rm grype.tar.gz
      - name: Scan CycloneDX SBOM for vulnerabilities
        run: grype sbom:sbom-cyclonedx.json --fail-on critical
      - name: Scan SPDX SBOM for vulnerabilities
        run: grype sbom:sbom-spdx.json --fail-on critical

      # Sign SBOMs with cosign (keyless / OIDC)
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - name: Sign CycloneDX SBOM
        run: cosign sign-blob --yes --bundle sbom-cyclonedx.json.bundle sbom-cyclonedx.json
        env:
          COSIGN_EXPERIMENTAL: "1"
      - name: Sign SPDX SBOM
        run: cosign sign-blob --yes --bundle sbom-spdx.json.bundle sbom-spdx.json
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Upload SBOMs and signatures
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-artifacts
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.json.bundle
            sbom-spdx.json
            sbom-spdx.json.bundle
          if-no-files-found: error

  # ── Stage 4: Secret Scanning ─────────────────────────────────────────────────
  secret-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Gitleaks (detect leaked credentials)
        uses: gitleaks/gitleaks-action@cb7149a9b57195b609c63e8518d2c6056677d2d0 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 5: Dependency Review (PRs only) ────────────────────────────────────
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.6.0
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0

  # ── Stage 6: Container Build, Sign & Scan ────────────────────────────────────
  container:
    runs-on: ubuntu-latest
    needs: [check, security, sbom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        service: [gateway, orchestrator, opaque, tss, verifier, admin, ratchet, audit]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy container image scanning (fail on critical/high)
      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e # v0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Install cosign for image signing
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      # Sign the container image (keyless / OIDC via Fulcio + Rekor)
      - name: Sign container image with cosign
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      # Generate SBOM for container image and attach it
      - name: Install syft for container SBOM
        run: |
          SYFT_VERSION="1.19.0"
          SYFT_SHA256="b9fee431b498e389173c7202e98f83e839a5c191c498738771b1af0e36e7ade3"
          curl -sSfL -o syft.tar.gz "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          echo "${SYFT_SHA256}  syft.tar.gz" | sha256sum -c -
          tar -xzf syft.tar.gz -C /usr/local/bin syft
          rm syft.tar.gz
      - name: Generate and attach container SBOM
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
          syft "$IMAGE_REF" -o cyclonedx-json > "container-sbom-${{ matrix.service }}.json"
          cosign attach sbom \
            --sbom "container-sbom-${{ matrix.service }}.json" \
            "$IMAGE_REF"
        env:
          COSIGN_EXPERIMENTAL: "1"

      # Sign the attached SBOM
      - name: Sign container SBOM
        run: |
          cosign sign --yes \
            --attachment sbom \
            "ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      # Upload container SBOM as build artifact
      - name: Upload container SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-sbom-${{ matrix.service }}
          path: container-sbom-${{ matrix.service }}.json
          if-no-files-found: error

      # Verify image signature before deployment gate
      - name: Verify container image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

  # ── Stage 7: SLSA Provenance ─────────────────────────────────────────────────
  provenance:
    needs: [container]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      actions: read
      id-token: write
      packages: write
      contents: write
      attestations: write
    strategy:
      matrix:
        service: [gateway, orchestrator, opaque, tss, verifier, admin, ratchet, audit]
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}/${{ matrix.service }}
      digest: ${{ needs.container.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 8: Build Reproducibility Verification ─────────────────────────────
  reproducibility:
    runs-on: ubuntu-latest
    needs: [container]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Reproducibility check (rebuild and compare)
        run: |
          echo "=== Build Reproducibility Verification ==="
          echo "Rebuilding admin service to verify deterministic output..."
          docker buildx build \
            --build-arg SERVICE_NAME=admin \
            --no-cache \
            --output type=docker,name=milnet-repro-check \
            .
          echo "Reproducibility build completed successfully."
          echo "In production, compare layer digests against the pushed image."

  # ── Stage 9: Signed Commits Verification (PRs only) ─────────────────────────
  commit-verification:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify commit signatures
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "=== Commit Signature Verification ==="
          UNSIGNED=0
          for COMMIT in $(git rev-list "origin/${BASE_REF}..HEAD"); do
            SIG=$(git log --format='%G?' -1 "$COMMIT")
            AUTHOR=$(git log --format='%an <%ae>' -1 "$COMMIT")
            if [ "$SIG" = "G" ] || [ "$SIG" = "U" ] || [ "$SIG" = "E" ]; then
              echo "SIGNED:   $COMMIT ($AUTHOR)"
            else
              echo "UNSIGNED: $COMMIT ($AUTHOR)"
              UNSIGNED=$((UNSIGNED + 1))
            fi
          done
          if [ "$UNSIGNED" -gt 0 ]; then
            echo ""
            echo "FATAL: $UNSIGNED unsigned commit(s) detected."
            echo "Policy: all commits targeting main/master MUST be signed (GPG or SSH)."
            echo "See: https://docs.github.com/en/authentication/managing-commit-signature-verification"
            exit 1
          fi
