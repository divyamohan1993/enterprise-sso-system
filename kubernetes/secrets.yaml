---
# ==============================================================================
# MILNET SSO — External Secrets (GCP Secret Manager)
# ==============================================================================
# Uses the External Secrets Operator to sync secrets from GCP Secret Manager
# into Kubernetes Secrets. Requires:
#   - external-secrets operator installed in the cluster
#   - GCP SecretStore configured with workload identity
# ==============================================================================

# --- GCP SecretStore (cluster-scoped provider) ---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
spec:
  provider:
    gcpsm:
      projectID: milnet-sso-prod
      auth:
        workloadIdentity:
          clusterLocation: asia-south1
          clusterName: milnet-sso-cluster
          serviceAccountRef:
            name: external-secrets-sa

---
# --- Database credentials ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-db-credentials
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: milnet-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        password: "{{ .password }}"
        database-url: "postgres://milnet:{{ .password }}@postgres:5432/milnet_sso"
  data:
    - secretKey: password
      remoteRef:
        key: milnet-db-password

---
# --- OAuth credentials ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-oauth-credentials
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: milnet-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: google-client-id
      remoteRef:
        key: milnet-google-client-id
    - secretKey: google-client-secret
      remoteRef:
        key: milnet-google-client-secret

---
# --- SHARD mTLS certificates ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-shard-tls
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: auth
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: milnet-shard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: milnet-shard-tls-cert
    - secretKey: tls.key
      remoteRef:
        key: milnet-shard-tls-key
    - secretKey: ca.crt
      remoteRef:
        key: milnet-shard-ca-cert

---
# --- HMAC key for SHARD transport ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-shard-hmac
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: auth
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: milnet-shard-hmac
    creationPolicy: Owner
  data:
    - secretKey: hmac-key
      remoteRef:
        key: milnet-shard-hmac-key

---
# --- KEK (Key Encryption Key) for envelope encryption ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-kek
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
    tier: auth
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: milnet-kek
    creationPolicy: Owner
  data:
    - secretKey: kek
      remoteRef:
        key: milnet-key-encryption-key
