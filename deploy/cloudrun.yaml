apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: milnet-sso
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/PROJECT_ID/milnet-sso:latest
          ports:
            - containerPort: 8080
          env:
            - name: ADMIN_PORT
              value: "8080"
            - name: RUST_LOG
              value: "info"
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
