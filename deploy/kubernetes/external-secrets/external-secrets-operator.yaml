# External Secrets Operator install reference.
# Pin the chart by digest in the GitOps deploy repo. Do NOT install via curl|sh.
#
# Helm command (run from a trusted CI worker):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm upgrade --install external-secrets external-secrets/external-secrets \
#     --version 0.10.4 \
#     --namespace external-secrets \
#     --create-namespace \
#     --set installCRDs=true \
#     --set webhook.port=9443 \
#     --set serviceMonitor.enabled=true
#
# Verify the chart provenance:
#   cosign verify external-secrets/external-secrets:0.10.4 \
#     --certificate-identity-regexp "https://github.com/external-secrets/.*" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
