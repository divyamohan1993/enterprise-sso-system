  annotations:
    milnet.io/test-orch-to-pg: "pg_isready-from-orchestrator-expect-ok"
    milnet.io/test-audit-to-pg: "pg_isready-from-audit-expect-ok"
    milnet.io/test-gw-to-pg: "pg_isready-from-gateway-expect-timeout"
    milnet.io/test-verifier-to-pg: "pg_isready-from-verifier-expect-timeout"
    milnet.io/test-pg-egress: "curl-8.8.8.8-from-postgres-expect-timeout"
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: orchestrator
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              app: audit
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              app: admin
      ports:
        - protocol: TCP
          port: 5432

