# MILNET SSO System — OPAQUE T-OPAQUE StatefulSet
# Threshold 2-of-3 OPAQUE password service. Each pod receives a unique
# sealed share and server ID from its ordinal index.
#
# SECURITY: Init container logic (server-id computation, share selection)
# is inlined into the main container entrypoint to eliminate busybox from
# the attack surface. No third-party init container images are used.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opaque
  namespace: milnet
  labels:
    app.kubernetes.io/name: opaque
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: opaque-password
spec:
  serviceName: opaque
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: opaque
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opaque
        app.kubernetes.io/part-of: milnet-sso
    spec:
      serviceAccountName: opaque-sa
      automountServiceAccountToken: false  # No K8s API access needed
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - opaque
              topologyKey: kubernetes.io/hostname
      # SECURITY: No init containers — all per-pod logic is inlined into the
      # main container entrypoint. This eliminates busybox from the image
      # supply chain, reducing attack surface and removing a shell-equipped
      # container that could be exploited if compromised.
      containers:
        - name: opaque
          image: gcr.io/MILNET_PROJECT/milnet-opaque:v1.0.0  # pinned version — never use :latest
          ports:
            - containerPort: 9102
              name: service
              protocol: TCP
            - containerPort: 10102
              name: health
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_OPAQUE_ADDR
              value: "0.0.0.0:9102"
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
          # Inline init logic: compute server ID from pod ordinal and select
          # the correct per-pod sealed share — replaces busybox init containers
          command:
            - sh
            - -c
            - |
              # Compute OPAQUE server ID from pod ordinal (1-based)
              ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
              export MILNET_OPAQUE_SERVER_ID=$((ORDINAL + 1))
              # Select the correct per-pod sealed share based on server ID
              SHARE_FILE="/etc/milnet/shares/share-${MILNET_OPAQUE_SERVER_ID}/MILNET_OPAQUE_SHARE_SEALED"
              if [ -f "$SHARE_FILE" ]; then
                export MILNET_OPAQUE_SHARE_SEALED=$(cat "$SHARE_FILE")
              fi
              exec /service
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: opaque-share-1
              mountPath: /etc/milnet/shares/share-1
              readOnly: true
            - name: opaque-share-2
              mountPath: /etc/milnet/shares/share-2
              readOnly: true
            - name: opaque-share-3
              mountPath: /etc/milnet/shares/share-3
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        # Individual share secrets for each OPAQUE server (1 through 3)
        - name: opaque-share-1
          secret:
            secretName: milnet-opaque-share-1
            optional: true
        - name: opaque-share-2
          secret:
            secretName: milnet-opaque-share-2
            optional: true
        - name: opaque-share-3
          secret:
            secretName: milnet-opaque-share-3
            optional: true
