# ── PostgreSQL Service ────────────────────────────────────────────────────────
# Non-headless service for read/write (routes to primary).
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: milnet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: milnet-sso
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# Headless service for PostgreSQL StatefulSet DNS
apiVersion: v1
kind: Service
