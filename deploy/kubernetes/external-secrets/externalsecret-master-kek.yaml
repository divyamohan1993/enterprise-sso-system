---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-master-kek
  namespace: milnet
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-milnet-prod
    kind: ClusterSecretStore
  target:
    name: milnet-master-kek
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        annotations:
          milnet.io/sensitivity: "TOP-SECRET"
  data:
    - secretKey: MILNET_MASTER_KEK
      remoteRef:
        key: milnet/prod/master-kek
        property: kek_hex
