[package]
name = "sso-protocol"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
common = { path = "../common" }
crypto = { path = "../crypto" }
serde.workspace = true
serde_json = "1"
uuid.workspace = true
sha2.workspace = true
hmac.workspace = true
base64 = "0.22"
hex = "0.4"
subtle.workspace = true
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls", "postgres", "uuid"] }
tokio = { workspace = true, features = ["full"] }

[dev-dependencies]
proptest = "1"
ratchet = { path = "../ratchet" }
uuid = { version = "1", features = ["v4"] }
