name: Continuous Fuzzing
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        target:
          # Core protocol targets (critical path)
          - fuzz_shard_message
          - fuzz_envelope_decrypt
          - fuzz_token_verify
          - fuzz_pkce_verify
          - fuzz_receipt_chain
          - fuzz_revocation
          # Post-quantum crypto targets
          - fuzz_ml_dsa_verify
          - fuzz_slh_dsa_verify
          - fuzz_xwing_decapsulate
          # Authentication targets
          - fuzz_opaque_login
          - fuzz_fido2_auth
          - fuzz_dpop_verify
          - fuzz_jwt_verify
          - fuzz_jwe_decrypt
          # Protocol boundary targets
          - fuzz_saml_parse
          - fuzz_scim_parse
          - fuzz_raft_message
          - fuzz_wire_protocol
          # Resilience targets
          - fuzz_backup_restore
          - fuzz_threshold_reconstruct
          - fuzz_ratchet_verify
          # Constant-time verification
          - fuzz_ct_eq
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzzer
        env:
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          cd fuzz
          cargo +nightly fuzz run "$FUZZ_TARGET" -- \
            -max_total_time=300 \
            -max_len=65536
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
