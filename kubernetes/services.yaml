---
# ==============================================================================
# MILNET SSO — Kubernetes Services
# ==============================================================================
# ClusterIP for all internal services. LoadBalancer only for gateway.
# ==============================================================================

# --- Gateway (public-facing LoadBalancer) ---
# Test: verify external IP is assigned
#   Expected: kubectl get svc gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' returns IP
# Test: verify gateway is reachable on port 9100 from outside cluster
#   Expected: TCP handshake succeeds, puzzle challenge returned
# Test: verify all internal services are ClusterIP (not externally reachable)
#   Expected: only gateway has type=LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: milnet-sso
  labels:
    app: gateway
    tier: bastion
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: gateway
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    milnet.io/test-external-ip: "get-svc-verify-loadbalancer-ip-assigned"
    milnet.io/test-reachable: "tcp-connect-external-ip:9100-expect-puzzle"
    milnet.io/test-internal-only: "get-svc-verify-only-gateway-is-loadbalancer"
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
    - 0.0.0.0/0
  selector:
    app: gateway
  ports:
    - name: shard
      port: 9100
      targetPort: 9100
      protocol: TCP

---
# --- Admin (public-facing LoadBalancer for HTTP API) ---
apiVersion: v1
