# MILNET SSO System — RBAC Configuration
# Principle of least privilege: each service gets its own ServiceAccount with
# access restricted to only the secrets it needs. No service can read another
# service's secrets. automountServiceAccountToken is disabled by default to
# prevent token theft from compromised containers.
#
# SECURITY RATIONALE: The default ServiceAccount in a namespace can read all
# secrets if any RoleBinding grants it access. By creating per-service SAs
# with narrow Roles, a compromised pod cannot pivot to other services' secrets.
---

# ── ServiceAccounts ──────────────────────────────────────────────────────────
# automountServiceAccountToken: false prevents the SA token from being mounted
# into the pod filesystem. Only enable where the pod needs K8s API access.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
  namespace: milnet
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: milnet-sso
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-sa
  namespace: milnet
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: milnet-sso
automountServiceAccountToken: false

