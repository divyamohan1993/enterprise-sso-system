# PostgreSQL 16 — single instance for MVP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: milnet
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        role: primary
    spec:
      containers:
        - name: postgres
          image: postgres:16-bookworm
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: milnet
            - name: POSTGRES_USER
              value: milnet
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milnet-database
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "milnet"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          emptyDir: {}
