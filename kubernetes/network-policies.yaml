#   Expected: success (gateway -> orchestrator allowed)
# Test: curl orchestrator:9101 from verifier pod
#   Expected: timeout (verifier -> orchestrator not in matrix)
# Test: curl postgres:5432 from orchestrator pod
#   Expected: success (orchestrator -> postgres allowed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
