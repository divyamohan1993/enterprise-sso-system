---
# ── Roles (minimum privilege per service) ────────────────────────────────────
# Each Role grants 'get' on specific named secrets only. No 'list' or 'watch'
# permissions are granted — a compromised pod cannot enumerate secrets.

# Gateway: needs TLS certs, gateway config, and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-tls-certs
      - milnet-gateway-config
      - milnet-master-kek
    verbs: ["get"]

---
# Orchestrator: needs database URL, HSM config, and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-database
      - milnet-hsm-config
      - milnet-master-kek
    verbs: ["get"]

---
# OPAQUE: needs its share secrets and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opaque-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: opaque
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-opaque-share-1
      - milnet-opaque-share-2
      - milnet-opaque-share-3
      - milnet-master-kek
    verbs: ["get"]

---
# TSS Coordinator: needs TSS public key and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tss-coordinator-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-coordinator
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-tss-public
      - milnet-master-kek
    verbs: ["get"]

---
# TSS Signer: needs its share secrets and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tss-signer-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-signer
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-tss-share-0
      - milnet-tss-share-1
      - milnet-tss-share-2
      - milnet-tss-share-3
      - milnet-tss-share-4
      - milnet-master-kek
    verbs: ["get"]

---
# Verifier: needs TSS public key for signature verification
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: verifier-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: verifier
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-tss-public
      - milnet-master-kek
    verbs: ["get"]

---
# Ratchet: needs master KEK only (DB URL comes from orchestrator config)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ratchet-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: ratchet
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-master-kek
    verbs: ["get"]

---
# Audit: needs SIEM integration secrets and master KEK
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: audit-secrets-reader
  namespace: milnet
