# MILNET SSO System — Secrets (TEMPLATE — values must be replaced before apply)
#
# WARNING: This file is a template only. All values are REDACTED placeholders.
# In production, use a sealed-secrets controller, HashiCorp Vault, or GCP Secret
# Manager with External Secrets Operator. NEVER commit real secrets to version control.
---
apiVersion: v1
kind: Secret
metadata:
  name: milnet-tls-certs
  namespace: milnet
  labels:
    app.kubernetes.io/part-of: milnet-sso
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate chain (PEM)
  tls.crt: "REDACTED_BASE64_ENCODED_CERTIFICATE"
  # Base64-encoded TLS private key (PEM)
  tls.key: "REDACTED_BASE64_ENCODED_PRIVATE_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: milnet-master-kek
  namespace: milnet
  labels:
    app.kubernetes.io/part-of: milnet-sso
type: Opaque
data:
  # 32-byte hex-encoded master Key Encryption Key
  MILNET_MASTER_KEK: "REDACTED_BASE64_ENCODED_HEX_KEK"

