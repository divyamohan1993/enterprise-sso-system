        - podSelector:
            matchLabels:
              app: orchestrator
      ports:
        - protocol: TCP
          port: 9103
    - from:
        - podSelector:
            matchLabels:
              app: verifier
      ports:
        - protocol: TCP
          port: 9103
    - from:
        - podSelector:
            matchLabels:
              app: audit
      ports:
        - protocol: TCP
          port: 9103
    # TSS peer-to-peer (FROST protocol)
    - from:
        - podSelector:
            matchLabels:
              app: tss
      ports:
        - protocol: TCP
          port: 9103

