# ==============================================================================
# MILNET SSO — Kernel & System Hardening (sysctl)
# ==============================================================================
# Install to: /etc/sysctl.d/99-milnet-hardening.conf
# Apply with: sysctl --system
#
# Every setting includes the security rationale and the threat it mitigates.
# These settings are cumulative with distribution defaults.
# ==============================================================================

# ══════════════════════════════════════════════════════════════════════════════
# Network Hardening
# ══════════════════════════════════════════════════════════════════════════════

# Strict Reverse Path Filtering — drop packets arriving on an interface
# where the source address would not be routable. Prevents IP spoofing
# attacks where an attacker forges source IPs to bypass ACLs.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Reject ICMP redirects — prevents man-in-the-middle attacks where a
# compromised router sends redirects to reroute traffic through an
# attacker-controlled path.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects — this host is not a router. Sending
# redirects could be abused to map internal network topology.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets — source routing allows an attacker to
# specify the exact path a packet takes, bypassing firewall rules.
# Legitimate traffic never uses source routing.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Enable TCP SYN cookies — protects against SYN flood denial-of-service
# by sending a cryptographic cookie in the SYN-ACK instead of allocating
# state. Only activates under memory pressure from half-open connections.
net.ipv4.tcp_syncookies = 1

# Increase SYN backlog — allows more half-open connections before
# SYN cookies activate. Gives legitimate clients a better chance during
# mild SYN flood conditions.
net.ipv4.tcp_max_syn_backlog = 4096

# Disable IP forwarding — this machine is NOT a router. Prevents an
# attacker who compromises one service from using the host to pivot
# into other network segments.
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Log Martian packets — packets with impossible source addresses
# (reserved, loopback on non-lo, etc.). These indicate spoofing attempts
# or severe misconfiguration.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore broadcast ICMP (Smurf attack mitigation).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses to prevent log pollution.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# TCP timestamps — keep enabled for PAWS (Protection Against Wrapped
# Sequence numbers) but note this leaks uptime information. The security
# benefit of PAWS outweighs the information disclosure risk.
net.ipv4.tcp_timestamps = 1

# Disable router advertisements on all interfaces — this host does not
# need to discover routers dynamically. Static routes only.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# ══════════════════════════════════════════════════════════════════════════════
# Memory Hardening
# ══════════════════════════════════════════════════════════════════════════════

# Full ASLR — randomize stack, VDSO, shared memory, mmap, and heap.
# Makes exploitation significantly harder by preventing predictable
# memory layouts. Value 2 = full randomization (stack + heap + mmap).
kernel.randomize_va_space = 2

# Hide kernel pointers in /proc/kallsyms and other interfaces.
# Prevents information leaks that help attackers calculate KASLR offsets
# for kernel exploits. Value 2 = hidden for all users including root
# unless they have CAP_SYSLOG.
kernel.kptr_restrict = 2

# Restrict dmesg to root — kernel ring buffer often contains addresses
# and hardware details useful for exploitation.
kernel.dmesg_restrict = 1

# Maximum paranoia for perf events — disable perf_event_open() for
# unprivileged users. Perf has been a repeated source of kernel
# privilege escalation vulnerabilities.
kernel.perf_event_paranoid = 3

# NO ptrace — CRITICAL for key protection. Prevents any process from
# attaching to another process to read its memory. Without this, a
# compromised low-privilege service could ptrace a TSS or OPAQUE
# process and extract cryptographic keys from memory.
# Value 3 = no process may ptrace any other process (most restrictive).
kernel.yama.ptrace_scope = 3

# Minimum virtual memory address — prevents NULL pointer dereference
# exploits by ensuring the first 64KB of address space is unmapped.
vm.mmap_min_addr = 65536

# Disable unprivileged BPF — BPF has been a major kernel attack surface.
# Only root should load BPF programs (for network filtering).
kernel.unprivileged_bpf_disabled = 1

# Harden BPF JIT — when BPF is used (by root for nftables), enable
# constant blinding to make JIT spray attacks harder.
net.core.bpf_jit_harden = 2

# ══════════════════════════════════════════════════════════════════════════════
# Core Dump Prevention
# ══════════════════════════════════════════════════════════════════════════════

# Redirect core dumps to /bin/false — effectively discard them.
# Core dumps of MILNET services would contain cryptographic keys,
# session tokens, and password material in cleartext.
kernel.core_pattern = |/bin/false

# Prevent SUID programs from creating core dumps.
fs.suid_dumpable = 0

# ══════════════════════════════════════════════════════════════════════════════
# Module Loading Restriction
# ══════════════════════════════════════════════════════════════════════════════

# IMPORTANT: This must be set AFTER boot, after all required modules
# (TPM, crypto, network drivers) are loaded. Once set to 1, no new
# kernel modules can be loaded — prevents rootkits from inserting
# malicious kernel modules.
#
# The install.sh script enables this AFTER verifying all required
# modules are loaded. If your TPM driver is a module, load it first.
#
# Uncomment after initial setup is verified:
# kernel.modules_disabled = 1

# ══════════════════════════════════════════════════════════════════════════════
# Filesystem Hardening
# ══════════════════════════════════════════════════════════════════════════════

# Restrict access to kernel logs via /proc/sys/kernel/printk.
kernel.printk = 3 3 3 3

# Protect hard and symlinks — prevent symlink/hardlink attacks where
# an attacker creates links to privileged files in world-writable dirs.
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# ══════════════════════════════════════════════════════════════════════════════
# User Namespace Restriction
# ══════════════════════════════════════════════════════════════════════════════

# Restrict unprivileged user namespaces — user namespaces have been
# a major attack surface for privilege escalation. Disable for
# unprivileged users (MILNET services use systemd's PrivateUsers=
# which works as root before dropping privileges).
kernel.unprivileged_userns_clone = 0
