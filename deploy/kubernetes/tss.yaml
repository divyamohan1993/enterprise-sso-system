# MILNET SSO System — TSS (Threshold Signing Service) StatefulSets
# Two components:
#   1. tss-coordinator: 3 replicas with Raft leader election, routes signing requests
#   2. tss-signer: 5 replicas, each holds a unique FROST 3-of-5 share
---
# ── TSS Coordinator StatefulSet ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tss-coordinator
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-coordinator
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: tss-coordinator
spec:
  serviceName: tss-coordinator
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: tss-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tss-coordinator
        app.kubernetes.io/part-of: milnet-sso
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - tss-coordinator
              topologyKey: kubernetes.io/hostname
      containers:
        - name: tss-coordinator
          image: gcr.io/MILNET_PROJECT/milnet-sso:latest
          ports:
            - containerPort: 9103
              name: service
              protocol: TCP
            - containerPort: 9090
              name: raft
              protocol: TCP
            - containerPort: 10103
              name: health
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_TSS_ROLE
              value: "coordinator"
            - name: TSS_ADDR
              value: "0.0.0.0:9103"
            - name: MILNET_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MILNET_SERVICE_TYPE
              value: "tss-coordinator"
            - name: MILNET_RAFT_ADDR
              value: "0.0.0.0:9090"
            # Raft peers for coordinator leader election
            - name: MILNET_CLUSTER_PEERS
              value: >-
                tss-coordinator-0.tss-coordinator.milnet.svc.cluster.local:9090,
                tss-coordinator-1.tss-coordinator.milnet.svc.cluster.local:9090,
                tss-coordinator-2.tss-coordinator.milnet.svc.cluster.local:9090
            # Signer addresses for the coordinator to reach all 5 signers
            - name: MILNET_TSS_SIGNER_ADDRS
              value: >-
                tss-signer-0.tss-signer.milnet.svc.cluster.local:9110,
                tss-signer-1.tss-signer.milnet.svc.cluster.local:9111,
                tss-signer-2.tss-signer.milnet.svc.cluster.local:9112,
                tss-signer-3.tss-signer.milnet.svc.cluster.local:9113,
                tss-signer-4.tss-signer.milnet.svc.cluster.local:9114
            - name: MILNET_TSS_PUBLIC_KEY_PACKAGE
              valueFrom:
                secretKeyRef:
                  name: milnet-tss-public
                  key: MILNET_TSS_PUBLIC_KEY_PACKAGE
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: state
              mountPath: /var/lib/milnet
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: state
        labels:
          app.kubernetes.io/name: tss-coordinator
          app.kubernetes.io/part-of: milnet-sso
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd-encrypted
        resources:
          requests:
            storage: 5Gi

---
# ── TSS Signer StatefulSet ────────────────────────────────────────────────────
# 5 replicas. Each signer holds a unique FROST share (3-of-5 threshold).
# Shares are injected from per-index Secrets (milnet-tss-share-0 through milnet-tss-share-4).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tss-signer
  namespace: milnet
  labels:
    app.kubernetes.io/name: tss-signer
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: tss-signer
spec:
  serviceName: tss-signer
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: tss-signer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tss-signer
        app.kubernetes.io/part-of: milnet-sso
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # Prefer spreading signers across nodes for maximum fault tolerance.
          # Using preferred (not required) because we have 5 signers and may
          # have fewer than 5 nodes; required would leave pods unschedulable.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - tss-signer
                topologyKey: kubernetes.io/hostname
      # Init container computes signer-specific port and loads the correct share.
      initContainers:
        - name: compute-signer-env
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
              SIGNER_PORT=$((9110 + ORDINAL))
              echo "MILNET_TSS_SIGNER_ADDR=0.0.0.0:${SIGNER_PORT}" > /etc/milnet/env/signer-env
              echo "MILNET_HEALTH_PORT=$((SIGNER_PORT + 1000))" >> /etc/milnet/env/signer-env
          volumeMounts:
            - name: env-config
              mountPath: /etc/milnet/env
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: tss-signer
          image: gcr.io/MILNET_PROJECT/milnet-sso:latest
          # Ports are dynamic (9110+ordinal), but we declare the range for documentation.
          ports:
            - containerPort: 9110
              name: service
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_TSS_ROLE
              value: "signer"
            - name: MILNET_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          # Each signer loads its env file and indexed share secret at startup.
          # A mutating webhook or CSI secret store driver should inject the correct
          # milnet-tss-share-{ordinal} based on pod identity. For clarity, we
          # mount the share from a projected volume and use command to source env.
          command:
            - sh
            - -c
            - |
              # Source computed signer address and health port
              export $(cat /etc/milnet/env/signer-env | xargs)
              # Source the sealed share
              if [ -f /etc/milnet/share/MILNET_TSS_SHARE_SEALED ]; then
                export MILNET_TSS_SHARE_SEALED=$(cat /etc/milnet/share/MILNET_TSS_SHARE_SEALED)
              fi
              exec /service
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - IPC_LOCK
          livenessProbe:
            tcpSocket:
              port: 9110
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9110
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: env-config
              mountPath: /etc/milnet/env
            - name: share
              mountPath: /etc/milnet/share
              readOnly: true
            - name: state
              mountPath: /var/lib/milnet
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: env-config
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        # Per-pod share: in production, use a CSI secret store driver or
        # mutating webhook to inject milnet-tss-share-{ordinal}.
        # This placeholder mounts share-0; override per pod via webhook.
        - name: share
          secret:
            secretName: milnet-tss-share-0
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: state
        labels:
          app.kubernetes.io/name: tss-signer
          app.kubernetes.io/part-of: milnet-sso
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd-encrypted
        resources:
          requests:
            storage: 2Gi
