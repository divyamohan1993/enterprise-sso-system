name: CI
on: [push, pull_request]
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace --release

  security:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # cargo-deny: license, advisory, source, and ban checks
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories
        run: cargo deny check advisories
      - name: Check licenses
        run: cargo deny check licenses
      - name: Check sources
        run: cargo deny check sources
      - name: Check bans
        run: cargo deny check bans

      # cargo-audit: complementary vulnerability database check
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit

      # TODO: Add SBOM generation step once cargo-sbom is stable.
      # Planned: cargo install cargo-sbom && cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json
      # The SBOM artifact should be uploaded via actions/upload-artifact for downstream consumers.
