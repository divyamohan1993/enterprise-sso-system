    milnet.io/test-verifier-to-orch: "curl-orchestrator:9101-from-verifier-expect-timeout"
    milnet.io/test-orch-to-pg: "pg_isready-from-orchestrator-expect-ok"
spec:
  podSelector:
    matchLabels:
      app: orchestrator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 9101
    - from:
        - podSelector:
            matchLabels:
              app: opaque
      ports:
        - protocol: TCP
          port: 9101
    - from:
        - podSelector:
            matchLabels:
              app: tss
      ports:
        - protocol: TCP
          port: 9101
    - from:
        - podSelector:
            matchLabels:
              app: risk
      ports:
        - protocol: TCP
          port: 9101
    - from:
        - podSelector:
            matchLabels:
              app: ratchet
      ports:
        - protocol: TCP
          port: 9101
    - from:
        - podSelector:
            matchLabels:
              app: kt
      ports:
