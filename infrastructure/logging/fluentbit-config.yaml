# ──────────────────────────────────────────────────────────────────────────────
# MILNET SSO — Fluent Bit DaemonSet Configuration
# ──────────────────────────────────────────────────────────────────────────────
# Deployed as a DaemonSet on every GKE node. Collects container logs and
# forwards them to Cloud Logging with structured JSON parsing, trace/span ID
# extraction, and severity mapping.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/part-of: milnet-sso
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: milnet-sso
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Log_Level       info
        Daemon          off
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On
        HC_Errors_Count 5
        HC_Retry_Failure_Count 5
        HC_Period       60
        storage.path    /var/fluent-bit/state
        storage.sync    normal
        storage.checksum off
        storage.backlog.mem_limit 5M

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/milnet-*.log
        Parser            docker
        DB                /var/fluent-bit/state/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5
        Rotate_Wait       30
        Read_from_Head    True

    [INPUT]
        Name              tail
        Tag               audit.*
        Path              /var/log/containers/milnet-audit-*.log
        Parser            docker
        DB                /var/fluent-bit/state/flb_audit.db
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   Off
        Refresh_Interval  2
        Read_from_Head    True

    [FILTER]
        Name              kubernetes
        Match             kube.*
        Kube_URL          https://kubernetes.default.svc:443
        Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix   kube.var.log.containers.
        Merge_Log         On
        Merge_Log_Key     log_parsed
        Keep_Log          Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Labels            On
        Annotations       Off

    [FILTER]
        Name              kubernetes
        Match             audit.*
        Kube_URL          https://kubernetes.default.svc:443
        Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix   audit.var.log.containers.
        Merge_Log         On
        Merge_Log_Key     log_parsed
        Keep_Log          Off
        Labels            On

    # Extract trace and span IDs from structured JSON logs for Cloud Trace
    [FILTER]
        Name              modify
        Match             *
        Rename            log_parsed.trace_id logging.googleapis.com/trace
        Rename            log_parsed.span_id  logging.googleapis.com/spanId

    # Map MILNET severity levels to Cloud Logging severity
    [FILTER]
        Name              modify
        Match             *
        Condition         Key_Value_Equals log_parsed.severity CRITICAL
        Set               severity CRITICAL

    [FILTER]
        Name              modify
        Match             *
        Condition         Key_Value_Equals log_parsed.severity HIGH
        Set               severity ERROR

    [FILTER]
        Name              modify
        Match             *
        Condition         Key_Value_Equals log_parsed.severity MEDIUM
        Set               severity WARNING

    [FILTER]
        Name              modify
        Match             *
        Condition         Key_Value_Equals log_parsed.severity LOW
        Set               severity INFO

    [FILTER]
        Name              modify
        Match             *
        Condition         Key_Value_Equals log_parsed.severity INFO
        Set               severity DEBUG

    # Add MILNET metadata to all log entries
    [FILTER]
        Name              record_modifier
        Match             *
        Record            system milnet-sso
        Record            classification military-grade

    [OUTPUT]
        Name              stackdriver
        Match             *
        Resource          k8s_container
        k8s_cluster_name  milnet-sso-de033d2b
        k8s_cluster_location asia-south1
        severity_key      severity
        Workers           2
        Retry_Limit       5

    # Secondary output: local file buffer for disaster recovery
    [OUTPUT]
        Name              file
        Match             audit.*
        Path              /var/fluent-bit/audit-backup
        Format            plain
        Mkdir             True

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On

    [PARSER]
        Name        milnet_json
        Format      json
        Time_Key    timestamp
        Time_Format %sZ
        Time_Keep   On
        Decode_Field_As json log

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: milnet-sso
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: milnet-sso
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1
          ports:
            - containerPort: 2020
              name: http-metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/
            - name: state
              mountPath: /var/fluent-bit/state
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
        - name: state
          hostPath:
            path: /var/fluent-bit/state
            type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
  annotations:
    iam.gke.io/gcp-service-account: milnet-audit-de033d2b@lmsforshantithakur.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: logging
