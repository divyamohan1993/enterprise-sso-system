# MILNET SSO System — Service Resources
# Headless services for StatefulSets (stable DNS), ClusterIP for Deployments,
# LoadBalancer for gateway (public-facing).
---

# ── Gateway LoadBalancer (external ingress) ────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: milnet
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: milnet-sso
  annotations:
    # GCP-specific: restrict to internal load balancer if desired
    # networking.gke.io/load-balancer-type: "Internal"
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: https
      port: 443
      targetPort: 9100
      protocol: TCP
    - name: health
      port: 10100
      targetPort: 10100
      protocol: TCP
  externalTrafficPolicy: Local
  # Preserve client source IP for rate limiting
  sessionAffinity: None

---
# ── Orchestrator Headless Service (Raft peer discovery) ───────────────────────
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: milnet
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: milnet-sso
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: orchestrator
  ports:
    - name: service
      port: 9101
      targetPort: 9101
      protocol: TCP
    - name: raft
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: health
      port: 10101
      targetPort: 10101
      protocol: TCP
  publishNotReadyAddresses: true

