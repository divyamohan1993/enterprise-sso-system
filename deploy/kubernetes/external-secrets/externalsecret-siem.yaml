# MILNET SSO — SIEM webhook auth token + mTLS client cert via External Secrets
#
# Replaces the static `milnet-siem` Opaque secret in deploy/kubernetes/secrets.yaml.
# Refresh interval 1h triggers a rolling restart of any consumer Deployment via
# the `reloader.stakater.com/auto: "true"` annotation on the workload spec.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: milnet-siem
  namespace: milnet
  labels:
    app.kubernetes.io/part-of: milnet-sso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: milnet-siem
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          reloader.stakater.com/auto: "true"
      type: Opaque
      data:
        MILNET_SIEM_WEBHOOK_URL: "{{ .url }}"
        MILNET_SIEM_AUTH_TOKEN: "{{ .token }}"
        MILNET_SIEM_CLIENT_CERT_PEM: "{{ .client_cert }}"
        MILNET_SIEM_CLIENT_KEY_PEM: "{{ .client_key }}"
        # SHA-512 hex of the expected SIEM server leaf certificate. The
        # siem_webhook client refuses to deliver if the peer cert hash does
        # not match. See common/src/siem_webhook.rs.
        MILNET_SIEM_SERVER_PIN_SHA512: "{{ .server_pin_sha512 }}"
  data:
    - secretKey: url
      remoteRef:
        key: secret/milnet/siem
        property: webhook_url
    - secretKey: token
      remoteRef:
        key: secret/milnet/siem
        property: auth_token
    - secretKey: client_cert
      remoteRef:
        key: secret/milnet/siem
        property: client_cert_pem
    - secretKey: client_key
      remoteRef:
        key: secret/milnet/siem
        property: client_key_pem
    - secretKey: server_pin_sha512
      remoteRef:
        key: secret/milnet/siem
        property: server_pin_sha512
