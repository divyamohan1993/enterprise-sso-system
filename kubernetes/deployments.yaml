---
# --- PostgreSQL StatefulSet ---
# Test: verify PVC is bound and data persists across pod restarts
#   Expected: kubectl delete pod postgres-0 && wait; data still present
# Test: verify postgres runs as uid 999 (not root)
#   Expected: exec id -> uid=999
# Test: verify readOnlyRootFilesystem with writable PGDATA via PVC
#   Expected: touch /tmp/test -> ok; touch /etc/test -> read-only error
# Test: verify pg_isready liveness probe works
#   Expected: kubectl describe pod shows healthy liveness checks
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: milnet-sso
  labels:
    app: postgres
    tier: data
    version: v1
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: database
  annotations:
    milnet.io/test-pvc-persist: "delete-pod-verify-data-survives"
    milnet.io/test-nonroot: "exec-id-expect-uid-999"
    milnet.io/test-readonly-fs: "exec-touch-etc-expect-fail-touch-tmp-expect-ok"
    milnet.io/test-liveness: "describe-pod-verify-healthy-liveness"
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: data
        version: v1
        app.kubernetes.io/part-of: milnet-sso
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: postgres
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
              name: postgresql
          env:
            - name: POSTGRES_DB
              value: milnet_sso
            - name: POSTGRES_USER
              value: milnet
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milnet-db-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run/postgresql
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - milnet
                - -d
                - milnet_sso
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - milnet
                - -d
                - milnet_sso
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: run
          emptyDir:
            sizeLimit: 16Mi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
        labels:
          app: postgres
          app.kubernetes.io/part-of: milnet-sso
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
# --- Audit PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-data-pvc
  namespace: milnet-sso
  labels:
    app: audit
    app.kubernetes.io/part-of: milnet-sso
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
