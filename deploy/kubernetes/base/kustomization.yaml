# MILNET SSO — Kustomize base
# Plain tag images (`REPO/SERVICE:latest`). Digests are pinned exclusively in
# overlays/prod via `kustomize edit set image`. Never apply this base directly.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: milnet
resources:
  - ../namespace.yaml
  - ../audit-policy.yaml
  - ../network-policy.yaml
  - ../rbac.yaml
  - ../pod-disruption-budgets.yaml
  - ../external-secrets/external-secrets-operator.yaml
  - ../external-secrets/secret-store-vault.yaml
  - ../external-secrets/externalsecret-master-kek.yaml
  - ../external-secrets/externalsecret-tss-shares.yaml
  - ../external-secrets/externalsecret-pq-signing-keys.yaml
  - ../prod/workloads.yaml
commonLabels:
  app.kubernetes.io/part-of: milnet-sso
