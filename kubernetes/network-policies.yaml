# ==============================================================================
# PostgreSQL: database tier
# Only accepts connections from orchestrator, audit, admin
# ==============================================================================
# Test: pg_isready from orchestrator pod -> postgres:5432
#   Expected: success
# Test: pg_isready from audit pod -> postgres:5432
#   Expected: success
# Test: pg_isready from gateway pod -> postgres:5432
#   Expected: timeout (gateway has no data-tier access)
# Test: pg_isready from verifier pod -> postgres:5432
#   Expected: timeout (verifier has no data-tier access)
