[package]
name = "saml-sp"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
common = { path = "../common" }
crypto = { path = "../crypto" }
rsa-verify-shim = { path = "../rsa-verify-shim" }
serde.workspace = true
serde_json = "1"
thiserror.workspace = true
tracing.workspace = true
base64 = "0.22"
quick-xml = { version = "0.36", features = ["serialize"] }
sha2.workspace = true
parking_lot = "0.12"
subtle.workspace = true
ml-dsa.workspace = true

# dev-deps: rsa + rand are TEST-ONLY (synthetic SAML fixture generation). Production verification uses rsa-verify-shim (FIPS/aws-lc-rs).
[dev-dependencies]
rsa.workspace = true
rand.workspace = true

[features]
default = ["production"]
production = ["common/production"]
