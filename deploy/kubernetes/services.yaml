  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: milnet-sso
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  publishNotReadyAddresses: true
