[workspace]
resolver = "2"
members = [
    "milnet-common",
    "milnet-crypto",
    "milnet-shard",
    "milnet-gateway",
    "milnet-orchestrator",
    "milnet-tss",
    "milnet-verifier",
    "milnet-opaque",
    "milnet-ratchet",
    "milnet-kt",
    "milnet-risk",
    "milnet-audit",
]

[workspace.package]
edition = "2021"
rust-version = "1.85"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
zeroize = { version = "1", features = ["derive"] }
subtle = "2"
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1"
hkdf = "0.12"
hmac = "0.12"
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }
