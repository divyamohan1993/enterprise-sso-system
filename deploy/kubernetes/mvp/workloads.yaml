# MILNET SSO — MVP Workloads (all single-replica)
---
# ── Gateway ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: milnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10100"
    spec:
      containers:
        - name: gateway
          image: milnet/gateway:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 9100
            - containerPort: 10100
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: GATEWAY_BIND_ADDR
              value: "0.0.0.0"
            - name: MILNET_GATEWAY_CERT_PATH
              value: "/etc/milnet/tls/tls.crt"
            - name: MILNET_GATEWAY_KEY_PATH
              value: "/etc/milnet/tls/tls.key"
            - name: MILNET_ORCHESTRATOR_ENDPOINTS
              value: "orchestrator.milnet.svc.cluster.local:9101"
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls-certs
              mountPath: /etc/milnet/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: milnet-tls-certs
---
# ── Orchestrator ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
