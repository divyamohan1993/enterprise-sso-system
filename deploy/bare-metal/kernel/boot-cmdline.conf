# ==========================================================================
# MILNET SSO System — Hardened Kernel Command Line Parameters
# ==========================================================================
#
# These parameters are passed to the kernel at boot via the bootloader
# (systemd-boot, GRUB, or EFI stub). Each parameter hardens a specific
# attack surface. Do NOT modify without security review.
#
# Installation:
#   - systemd-boot: append to 'options' line in /loader/entries/milnet.conf
#   - GRUB: set in GRUB_CMDLINE_LINUX in /etc/default/grub
#   - EFI stub: embed with objcopy or pass via efistub
#
# The dm-verity root hash and salt are generated by dm-verity-setup.sh
# and MUST be replaced with actual values before deployment.
#
# CLASSIFICATION: UNCLASSIFIED // FOUO
# ==========================================================================

# ---------------------------------------------------------------------------
# ROOT FILESYSTEM (dm-verity)
# ---------------------------------------------------------------------------
# Root device is the dm-verity mapper device created by initramfs
root=/dev/mapper/verity-root

# Mount root as read-only (dm-verity requires this)
ro

# dm-verity root hash — REPLACE with output of dm-verity-setup.sh
# This is the Merkle tree root that authenticates every block of rootfs
milnet.roothash=REPLACE_WITH_ACTUAL_ROOT_HASH

# dm-verity salt — REPLACE with output of dm-verity-setup.sh
milnet.salt=REPLACE_WITH_ACTUAL_SALT

# ---------------------------------------------------------------------------
# INIT
# ---------------------------------------------------------------------------
# Use systemd as init (on the verified root)
init=/sbin/init

# ---------------------------------------------------------------------------
# KERNEL LOCKDOWN
# ---------------------------------------------------------------------------
# "confidentiality" is the highest lockdown level. It prevents:
#   - /dev/mem, /dev/kmem, /dev/port access
#   - kexec_load (prevents loading unsigned kernels at runtime)
#   - hibernation (memory image could be tampered with on disk)
#   - PCI BAR access from userspace
#   - Raw MSR access
#   - ioport access
#   - ACPI table override
#   - Module parameter modification via sysfs
#   - Direct kernel memory write via /proc/kcore
lockdown=confidentiality

# ---------------------------------------------------------------------------
# CONSOLE & LOGGING
# ---------------------------------------------------------------------------
# Suppress all but critical messages on console (no info leaks via display)
quiet
loglevel=3

# Disable kernel log access for unprivileged users
# (prevents reading dmesg which can leak kernel addresses)
# Applied via sysctl, but this sets the initial value
printk.devkmsg=on

# ---------------------------------------------------------------------------
# CPU VULNERABILITY MITIGATIONS
# ---------------------------------------------------------------------------

# Enable ALL CPU vulnerability mitigations and disable SMT
# SMT (HyperThreading) shares resources between logical cores, enabling:
#   - L1 Terminal Fault (L1TF/Foreshadow)
#   - Microarchitectural Data Sampling (MDS/RIDL/Fallout/ZombieLoad)
#   - TAA (TSX Asynchronous Abort)
#   - Various other side-channel attacks
# The ~30% performance hit from disabling SMT is acceptable for security.
mitigations=auto,nosmt

# Redundant nosmt for clarity — disable SMT/HyperThreading
nosmt

# Disable Intel TSX (Transactional Synchronization Extensions)
# TSX has been the source of multiple side-channel vulnerabilities:
#   - TAA (TSX Asynchronous Abort)
#   - TSX-based speculative execution attacks
tsx=off

# Speculative Store Bypass: force mitigation on all cores
# Prevents Spectre v4 (speculative store bypass) attacks
spec_store_bypass_disable=on

# Force huge page NX bit in KVM (even though we don't run VMs,
# defense-in-depth in case KVM module is ever loaded)
kvm.nx_huge_pages=force

# ---------------------------------------------------------------------------
# MEMORY HARDENING
# ---------------------------------------------------------------------------

# Disable vsyscall page entirely
# vsyscall is a legacy mechanism at a fixed address (0xffffffffff600000)
# that can be used as a ROP gadget. Modern glibc uses vDSO instead.
vsyscall=none

# Poison freed pages with a pattern to detect use-after-free
# This catches exploitation attempts that rely on reading freed memory
page_poison=1

# Disable slab merging — prevents cross-cache attacks
# Without this, the allocator merges similar-sized caches, allowing
# an attacker to spray one object type into another's cache
slab_nomerge

# Zero all page allocations and frees (redundant with CONFIG options
# but provides defense-in-depth at the command line level)
init_on_alloc=1
init_on_free=1

# Randomize kernel stack offset on each syscall entry
# Makes stack-based exploits unreliable
randomize_kstack_offset=on

# ---------------------------------------------------------------------------
# IOMMU (DMA PROTECTION)
# ---------------------------------------------------------------------------
# Force IOMMU for all devices — prevents DMA attacks from malicious
# PCIe devices (Thunderbolt, rogue NICs, etc.)
# Without IOMMU, any bus-mastering device can read/write all of physical RAM
iommu=force

# Enable strict IOMMU mode (no passthrough for any device)
iommu.strict=1
iommu.passthrough=0

# ---------------------------------------------------------------------------
# MACHINE CHECK EXCEPTION
# ---------------------------------------------------------------------------
# Panic on machine check exceptions (hardware errors)
# A hardware error on a crypto system could mean:
#   - Fault injection attack
#   - Rowhammer-style memory corruption
#   - Compromised hardware
# Fail-closed: panic and require operator intervention
mce=0

# ---------------------------------------------------------------------------
# COMPLETE COMMAND LINE (for copy-paste)
# ---------------------------------------------------------------------------
# Assemble all parameters into a single line:
#
# root=/dev/mapper/verity-root ro milnet.roothash=REPLACE_WITH_ACTUAL_ROOT_HASH milnet.salt=REPLACE_WITH_ACTUAL_SALT lockdown=confidentiality init=/sbin/init quiet loglevel=3 mitigations=auto,nosmt nosmt tsx=off spec_store_bypass_disable=on kvm.nx_huge_pages=force vsyscall=none page_poison=1 slab_nomerge init_on_alloc=1 init_on_free=1 randomize_kstack_offset=on iommu=force iommu.strict=1 iommu.passthrough=0 mce=0
