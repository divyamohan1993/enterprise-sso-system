SPECIFICATION FairSpec

CONSTANTS
    Users = {u1, u2, u3}
    TSSNodes = {n1, n2, n3, n4, n5}
    Threshold = 3
    MaxCeremonies = 3
    ClassificationLevels = {0, 1, 2, 3}
    DKGParticipants = {p1, p2, p3, p4, p5}
    ShamirNodes = {s1, s2, s3, s4, s5, s6, s7, s8, s9, s10, s11, s12, s13}
    ShamirThreshold = 7
    MaxEpochs = 3
    MaxElevationDuration = 10

INVARIANT
    TypeOK
    NoUnauthToken
    ThresholdIntegrity
    SessionUniqueness
    DKGSecretSafety
    OPAQUEPasswordBlindness
    RatchetForwardSecrecy
    RevokedTokenNeverVerified
    KeyRotationSafety
    Tier4ShareThreshold
    Tier1Completeness
    Tier3AttestationRequired
    BellLaPadulaNoReadUp
    ExpiredTokenNeverVerified
    ConditionalAccessPolicyInvariant
    MultiTenancyIsolation
    PIMNoSelfApproval
    PIMTimeBoundedElevation
    CAESessionReEvaluation

PROPERTY
    EventualAuth
    DKGEventualCompletion
    KeyRotationEventualCompletion
