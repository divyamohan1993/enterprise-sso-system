# ── TSS Signers (3 replicas for 2-of-3 threshold) ───────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tss-signer
  namespace: milnet
spec:
  replicas: 3
  serviceName: tss-signer
  selector:
    matchLabels:
      app.kubernetes.io/name: tss-signer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tss-signer
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: tss-signer
          image: milnet/tss:dev
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: MILNET_TSS_ROLE
              value: "signer"
            - name: MILNET_TSS_SIGNER_ADDR
              value: "0.0.0.0:9110"
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tss-state
              mountPath: /var/lib/milnet
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tss-state
          emptyDir: {}
