version: '3.8'

services:
  sso-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sso-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  sso-app:
    build: .
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: sso-db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      # Google OAuth placeholders (to be injected)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_ISSUER: ${OAUTH_ISSUER}
      CORS_ORIGIN: '*'
    ports:
      - "3000:3000"
    depends_on:
      sso-db:
        condition: service_healthy
    networks:
      - sso-net

networks:
  sso-net:
    driver: bridge

volumes:
  db_data:
