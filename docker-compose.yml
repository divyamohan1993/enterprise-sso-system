# ==============================================================================
# MILNET SSO — Docker Compose (Local Development & Testing)
# ==============================================================================
# Spins up all 8 microservices + PostgreSQL for local testing.
#
# Prerequisites:
#   1. Create a .env file with: MILNET_DB_PASSWORD=<secure_password>
#   2. docker compose up --build
#
# To enable developer mode, create a docker-compose.override.yml with
# DEVELOPER_MODE: "true" for the services that need it.
#
# Service ports:
#   gateway:      9100  (TCP — puzzle challenge + X-Wing KEM)
#   orchestrator: 9101  (SHARD mTLS — auth coordination)
#   opaque:       9102  (SHARD mTLS — OPAQUE password auth)
#   tss:          9103  (SHARD mTLS — FROST threshold signing)
#   verifier:     9104  (SHARD mTLS — token verification)
#   ratchet:      9105  (SHARD mTLS — session ratcheting)
#   audit:        9108  (SHARD mTLS — audit logging)
#   admin:        8080  (HTTP REST API)
#   postgres:     5432  (PostgreSQL)
#
# ==============================================================================
# NETWORK SEGMENTATION SECURITY MODEL
# ==============================================================================
#
# Defense-in-depth via tiered Docker bridge networks.  Each network is an
# isolated L2 broadcast domain.  A service can only reach peers on the same
# network.  The `internal: true` flag on non-bastion networks prevents any
# container on that network from reaching external IP addresses, enforcing
# egress filtering at the Docker networking layer.
#
# Tier 0 — BASTION (milnet_bastion, internal: false)
#   Purpose : Public-facing ingress.  Only the gateway and admin containers
#             attach here.  This is the sole network with external reachability.
#   Members : gateway, admin
#   Threat  : Exposed to the internet; hardened with puzzle challenges,
#             X-Wing KEM, and adaptive rate limiting.
#
# Tier 1 — AUTH CORE (milnet_auth, internal: true)
#   Purpose : Authentication processing.  The orchestrator coordinates OPAQUE
#             password verification and FROST threshold signing.  Gateway
#             attaches to reach the orchestrator, but OPAQUE and TSS are
#             invisible to external traffic.
#   Members : gateway (egress to orchestrator only), orchestrator, opaque, tss
#   Threat  : If gateway is compromised, the attacker can reach the
#             orchestrator but not OPAQUE or TSS directly (those only accept
#             connections from orchestrator via SHARD mTLS).
#
# Tier 2 — VERIFICATION (milnet_verify, internal: true)
#   Purpose : Token verification and session ratcheting.  Verifier checks
#             token signatures against TSS public keys; ratchet manages
#             session key rotation.
#   Members : verifier, ratchet, tss (for JWKS refresh)
#   Threat  : Completely unreachable from the bastion tier.  Even a fully
#             compromised gateway cannot reach verifier or ratchet.
#
# Tier 3 — SUPPORT (milnet_support, internal: true)
#   Purpose : Audit logging, key transparency, risk assessment.  These
#             services are write-heavy sinks that receive events from the
#             auth and verify tiers.
#   Members : audit, ratchet (for risk<->ratchet channel), orchestrator
#   Threat  : Audit is append-only; compromise does not grant auth
#             capabilities.  The internal flag prevents data exfiltration
#             to external hosts.
#
# Tier 4 — DATA (milnet_data, internal: true)
#   Purpose : Database access.  Only services that need persistent storage
#             attach here.  PostgreSQL has zero outbound connectivity.
#   Members : postgres, orchestrator, audit, admin
#   Threat  : PostgreSQL is the highest-value target.  Only three services
#             can reach it, and all require SHARD mTLS authentication.
#
# Communication matrix enforcement:
#   The Rust communication matrix in common/src/network.rs is the
#   authoritative source.  Docker networks provide coarse-grained
#   segmentation; SHARD mTLS + the matrix provide fine-grained enforcement.
#   A service on milnet_auth can only talk to peers on milnet_auth, but
#   within that network, SHARD still rejects disallowed module pairs
#   (e.g., gateway -> opaque is denied at the SHARD layer even though
#   both are on milnet_auth).
#
# Egress filtering per service:
#   gateway      — External (milnet_bastion): OAuth redirects, CRL checks
#   orchestrator — Internal only: auth, support, data networks
#   opaque       — Internal only: milnet_auth (orchestrator only via SHARD)
#   tss          — Internal only: milnet_auth + milnet_verify
#   verifier     — Internal only: milnet_verify
#   ratchet      — Internal only: milnet_verify + milnet_support
#   audit        — Internal only: milnet_support + milnet_data
#   admin        — Internal + External (milnet_bastion): all tiers for mgmt
#   postgres     — Internal only: milnet_data, zero outbound
#
# ==============================================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine@sha256:c4e7b2a0f3d5e8a1b6c9d2f4e7a0b3c5d8f1a4e7b0c3d6f9a2b5c8e1d4f7a0b3
    environment:
      POSTGRES_DB: milnet_sso
      POSTGRES_USER: milnet
      POSTGRES_PASSWORD: ${MILNET_DB_PASSWORD:?Set MILNET_DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /run/postgresql
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milnet -d milnet_sso"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - milnet_data

  # ── Audit Service ───────────────────────────────────────────────────────────
  # Started first (no service dependencies, other services log to it)
  audit:
    build:
      context: .
      args:
        SERVICE_NAME: audit
    environment:
      AUDIT_ADDR: "0.0.0.0:9108"
      AUDIT_DATA_DIR: /var/lib/milnet/audit
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - audit_data:/var/lib/milnet/audit
    networks:
      - milnet_support
      - milnet_data
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Ratchet Session Manager ─────────────────────────────────────────────────
  ratchet:
    build:
      context: .
      args:
        SERVICE_NAME: ratchet
    environment:
      RATCHET_ADDR: "0.0.0.0:9105"
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    networks:
      - milnet_verify
      - milnet_support
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── OPAQUE Password Service ─────────────────────────────────────────────────
  opaque:
    build:
      context: .
      args:
        SERVICE_NAME: opaque
    environment:
      OPAQUE_ADDR: "0.0.0.0:9102"
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    networks:
      - milnet_auth
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── TSS Threshold Signing ───────────────────────────────────────────────────
  tss:
    build:
      context: .
      args:
        SERVICE_NAME: tss
    environment:
      TSS_ADDR: "0.0.0.0:9103"
      TSS_NODE_ID: "0"
      TSS_TOTAL_NODES: "5"
      TSS_THRESHOLD: "3"
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    networks:
      - milnet_auth
      - milnet_verify
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Verifier ────────────────────────────────────────────────────────────────
  verifier:
    build:
      context: .
      args:
        SERVICE_NAME: verifier
    environment:
      VERIFIER_ADDR: "0.0.0.0:9104"
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    networks:
      - milnet_verify
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Orchestrator ────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      args:
        SERVICE_NAME: orchestrator
    environment:
      ORCH_LISTEN_ADDR: "0.0.0.0:9101"
      OPAQUE_ADDR: "opaque:9102"
      TSS_ADDR: "tss:9103"
      RUST_LOG: info
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      opaque:
        condition: service_started
      tss:
        condition: service_started
    networks:
      - milnet_auth
      - milnet_support
      - milnet_data
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Gateway ─────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
    environment:
      GATEWAY_PORT: "9100"
      GATEWAY_BIND_ADDR: "0.0.0.0"
      ORCHESTRATOR_ADDR: "orchestrator:9101"
      RUST_LOG: info
    ports:
      - "9100:9100"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      orchestrator:
        condition: service_started
    networks:
      - milnet_bastion
      - milnet_auth
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Admin API ───────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      args:
        SERVICE_NAME: admin
    environment:
      ADMIN_PORT: "8080"
      ADMIN_BIND_ADDR: "0.0.0.0"
      DATABASE_URL: "postgres://milnet:${MILNET_DB_PASSWORD:?Set MILNET_DB_PASSWORD}@postgres:5432/milnet_sso"
      GATEWAY_ADDR: "gateway:9100"
      ORCHESTRATOR_ADDR: "orchestrator:9101"
      VERIFIER_ADDR: "verifier:9104"
      RATCHET_ADDR: "ratchet:9105"
      AUDIT_ADDR: "audit:9108"
      RUST_LOG: info
      # Google OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SSO_BASE_URL: ${SSO_BASE_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_started
      orchestrator:
        condition: service_started
      verifier:
        condition: service_started
      ratchet:
        condition: service_started
      audit:
        condition: service_started
    networks:
      - milnet_bastion
      - milnet_auth
      - milnet_verify
      - milnet_support
      - milnet_data
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  pgdata:
  audit_data:

networks:
  # --------------------------------------------------------------------------
  # Tier 0 — BASTION (public-facing)
  # --------------------------------------------------------------------------
  # The only network with external reachability (internal: false).
  # Gateway accepts puzzle challenges from the internet; admin serves the
  # HTTP REST API.  All other networks are fully isolated.
  milnet_bastion:
    driver: bridge
    internal: false

  # --------------------------------------------------------------------------
  # Tier 1 — AUTH CORE (internal, no external egress)
  # --------------------------------------------------------------------------
  # Contains the authentication pipeline: orchestrator coordinates OPAQUE
  # (password verification) and TSS (FROST threshold signing).  Gateway
  # attaches to forward requests to the orchestrator, but cannot reach
  # OPAQUE or TSS directly (SHARD mTLS rejects gateway->opaque/tss).
  milnet_auth:
    driver: bridge
    internal: true

  # --------------------------------------------------------------------------
  # Tier 2 — VERIFICATION (internal, no external egress)
  # --------------------------------------------------------------------------
  # Token verification and session management.  Verifier validates tokens
  # using TSS JWKS; ratchet rotates session keys.  Completely unreachable
  # from the bastion tier — a compromised gateway cannot access these.
  milnet_verify:
    driver: bridge
    internal: true

  # --------------------------------------------------------------------------
  # Tier 3 — SUPPORT (internal, no external egress)
  # --------------------------------------------------------------------------
  # Audit logging, key transparency, and risk assessment.  Write-heavy
  # sinks that receive events from auth/verify tiers.  The internal flag
  # prevents exfiltration of audit data to external hosts.
  milnet_support:
    driver: bridge
    internal: true

  # --------------------------------------------------------------------------
  # Tier 4 — DATA (internal, no external egress)
  # --------------------------------------------------------------------------
  # Database tier.  PostgreSQL is the highest-value target — only
  # orchestrator, audit, and admin can reach it.  PostgreSQL itself
  # has zero outbound connectivity (no DNS, no internet, no peer services).
  milnet_data:
    driver: bridge
    internal: true
