---
# ==============================================================================
# MILNET SSO — ConfigMap (non-sensitive configuration)
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: milnet-config
  namespace: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
data:
  # Logging level for all Rust services
  rust-log: "info"

  # Public-facing base URL for OAuth callbacks and redirects
  sso-base-url: "https://sso.milnet.example.com"

  # Gateway configuration
  gateway-port: "9100"
  gateway-puzzle-difficulty: "20"

  # TSS FROST configuration
  tss-total-nodes: "5"
  tss-threshold: "3"

  # Rate limiting defaults
  rate-limit-window-secs: "60"
  rate-limit-max-per-ip: "10"
  rate-limit-max-concurrent: "1000"

  # Service discovery addresses (internal ClusterIP)
  orchestrator-addr: "orchestrator:9101"
  opaque-addr: "opaque:9102"
  tss-addr: "tss:9103"
  verifier-addr: "verifier:9104"
  ratchet-addr: "ratchet:9105"
  audit-addr: "audit:9108"
  postgres-addr: "postgres:5432"

  # Audit retention (days)
  audit-retention-days: "365"

  # Session ratchet interval (seconds)
  ratchet-interval-secs: "300"
