[package]
name = "shard"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
common = { path = "../common" }
crypto = { path = "../crypto" }
serde.workspace = true
postcard.workspace = true
hmac.workspace = true
sha2.workspace = true
hkdf.workspace = true
aes-gcm.workspace = true
getrandom.workspace = true
tokio.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rcgen.workspace = true
tracing.workspace = true
zeroize.workspace = true
hex.workspace = true

[dev-dependencies]
serial_test.workspace = true

[features]
default = ["production"]
production = ["common/production"]
test-internals = []
# A5: Gate the X25519MLKEM1024 kx-group behind this feature. Off by default
# because rustls/aws-lc-rs does not currently expose it. Enable to promote
# TLS key exchange to Level 5 once upstream lands the symbol.
tls_pq_level5 = []
