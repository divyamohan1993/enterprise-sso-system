#   Expected: success (tss <-> tss peer-to-peer for FROST)
# Test: curl tss:9103 from gateway pod
#   Expected: timeout (gateway -> tss denied)
# Test: curl tss:9103 from ratchet pod
#   Expected: timeout (ratchet -> tss not in matrix)
