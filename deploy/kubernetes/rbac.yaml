metadata:
  name: postgres-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-database
      - milnet-tls-certs
    verbs: ["get"]

---
# KT: needs master KEK only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kt-secrets-reader
  namespace: milnet
  labels:
    app.kubernetes.io/name: kt
    app.kubernetes.io/part-of: milnet-sso
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - milnet-master-kek
    verbs: ["get"]

---
# ── RoleBindings ─────────────────────────────────────────────────────────────
# Bind each SA to its corresponding Role. No cross-service access.

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-secrets-binding
  namespace: milnet
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: milnet-sso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-secrets-reader
subjects:
