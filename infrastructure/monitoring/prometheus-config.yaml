# ──────────────────────────────────────────────────────────────────────────────
# MILNET SSO — Prometheus Scrape Configuration
# ──────────────────────────────────────────────────────────────────────────────
# GKE Managed Prometheus is enabled on the cluster. This config defines
# PodMonitoring resources that tell GMP which pods to scrape.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: milnet-sso
  labels:
    app.kubernetes.io/part-of: milnet-sso
---
# ── Gateway Service Metrics ──
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: milnet-gateway
  namespace: milnet-sso
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: milnet-sso
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
---
