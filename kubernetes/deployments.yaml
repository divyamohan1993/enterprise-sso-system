---
# --- TSS Deployment (with anti-affinity for FROST threshold) ---
# Test: verify 5 TSS pods are on 5 different nodes (hard anti-affinity)
#   Expected: kubectl get pods -l app=tss -o wide shows 5 unique NODE values
#   If cluster has < 5 nodes, pods will be Pending (requiredDuringScheduling)
# Test: delete 2 TSS pods and verify FROST threshold (t=3) is still met
#   Expected: 3 remaining pods can still produce signatures
# Test: verify TSS_NODE_ID is derived from pod name (metadata.name)
#   Expected: each pod has a unique TSS_NODE_ID
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tss
  namespace: milnet-sso
  labels:
    app: tss
    tier: auth
    version: v1
    app.kubernetes.io/part-of: milnet-sso
    app.kubernetes.io/component: tss
  annotations:
    milnet.io/test-anti-affinity: "get-pods-wide-verify-5-unique-nodes"
    milnet.io/test-frost-threshold: "delete-2-pods-verify-signing-still-works"
    milnet.io/test-node-id: "exec-env-verify-TSS_NODE_ID-matches-pod-name"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: tss
  template:
    metadata:
      labels:
        app: tss
        tier: auth
        version: v1
        app.kubernetes.io/part-of: milnet-sso
        app.kubernetes.io/component: tss
    spec:
      serviceAccountName: tss
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Anti-affinity: spread TSS nodes across different physical hosts
      # so that compromising one host cannot exceed the FROST threshold
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - tss
              topologyKey: kubernetes.io/hostname
      containers:
        - name: tss
          image: gcr.io/milnet-sso/tss:latest
          ports:
            - containerPort: 9103
              protocol: TCP
              name: shard
          env:
            - name: TSS_ADDR
              value: "0.0.0.0:9103"
            - name: TSS_TOTAL_NODES
              value: "5"
            - name: TSS_THRESHOLD
              value: "3"
            - name: TSS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: milnet-config
                  key: rust-log
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 9103
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9103
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

