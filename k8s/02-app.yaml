apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-app
  namespace: sso-enterprise
  labels:
    app: sso-app
spec:
  replicas: 3 # High Availability
  selector:
    matchLabels:
      app: sso-app
  template:
    metadata:
      labels:
        app: sso-app
    spec:
      containers:
      - name: sso-app
        image: sso-system:latest # Assumes local build or registry push
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "sso-db"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: sso-secrets
              key: DB_PASS
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sso-secrets
              key: JWT_SECRET
        - name: OAUTH_ISSUER
          value: "http://vmip.dmj.one/login"
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /api
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sso-service
  namespace: sso-enterprise
spec:
  type: ClusterIP
  selector:
    app: sso-app
  ports:
  - port: 80
    targetPort: 3000
