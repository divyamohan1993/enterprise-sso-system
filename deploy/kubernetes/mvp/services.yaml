# Gateway — NodePort for external access
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: milnet
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: https
      port: 9100
      targetPort: 9100
      nodePort: 30443
    - name: health
      port: 10100
      targetPort: 10100
---
# Orchestrator
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: milnet
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: orchestrator
  ports:
    - name: service
      port: 9101
      targetPort: 9101
    - name: health
      port: 10101
      targetPort: 10101
  publishNotReadyAddresses: true
---
