            - containerPort: 9101
            - containerPort: 10101
          envFrom:
            - configMapRef:
                name: milnet-common-config
          env:
            - name: ORCH_LISTEN_ADDR
              value: "0.0.0.0:9101"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: milnet-database
                  key: DATABASE_URL
            - name: MILNET_MASTER_KEK
              valueFrom:
                secretKeyRef:
                  name: milnet-master-kek
                  key: MILNET_MASTER_KEK
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
